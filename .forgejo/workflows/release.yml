name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build/publish (e.g. v0.1.0)'
        required: true

concurrency:
  group: voxis-release-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: host
    timeout-minutes: 60
    env:
      GIT_PAGER: cat
      PAGER: cat
    steps:
      - name: resolve and checkout release tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag"
          if ! echo "$tag" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag '$tag' does not match vX.Y.Z format"
            exit 1
          fi
          base="${CI_GIT_BASE:-$GITHUB_SERVER_URL}"
          git init -q .
          git remote add origin "${base}/${GITHUB_REPOSITORY}.git"
          git -c http.extraheader="Authorization: basic $(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)" \
            -c protocol.version=2 fetch --depth=1 origin "refs/tags/$tag"
          git checkout -q FETCH_HEAD
          actual_tag=$(git --no-pager describe --tags --exact-match HEAD 2>/dev/null || true)
          echo "checked out tag: $actual_tag  HEAD: $(git rev-parse --short HEAD)"
          cargo_ver=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tauri_ver=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          expected_ver="${tag#v}"
          if [ "$cargo_ver" != "$expected_ver" ]; then
            echo "ERROR: src-tauri/Cargo.toml version '$cargo_ver' != tag version '$expected_ver'"
            exit 1
          fi
          if [ "$tauri_ver" != "$expected_ver" ]; then
            echo "ERROR: tauri.conf.json version '$tauri_ver' != tag version '$expected_ver'"
            exit 1
          fi
          echo "version: $cargo_ver (matches tag)"

      - name: ci-required gate (voxis-ci container)
        run: |
          set -euo pipefail
          cache="$HOME/.cache/voxis-ci"
          mkdir -p "$cache/cargo" "$cache/target" "$cache/home"
          docker run --rm \
            -v "$PWD":/w -w /w \
            -v "$cache/cargo":/tmp/cargo-home \
            -v "$cache/target":/tmp/ci-target \
            -v "$cache/home":/tmp/cihome \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            -e HOME=/tmp/cihome \
            --user "$(id -u):$(id -g)" \
            voxis-ci:latest \
            bash -euo pipefail -c '
              bun install --frozen-lockfile && bun run build &&
              cd src-tauri && cargo clippy --all-targets -- -D warnings &&
              cargo test --lib -- --test-threads=1 && cd .. &&
              bun run test:run
            '

  build:
    runs-on: host
    needs: [test]
    timeout-minutes: 180
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    env:
      GIT_PAGER: cat
      PAGER: cat
    steps:
      - name: preflight checks
        run: |
          set -euo pipefail
          echo "=== Disk ==="
          FREE_GB=$(df -BG /home/spex --output=avail | tail -1 | tr -d ' G')
          echo "free: ${FREE_GB}G"
          if [ "$FREE_GB" -lt 100 ]; then
            echo "ERROR: only ${FREE_GB}G free (need >= 100G)"
            exit 1
          fi
          echo "=== Docker ==="
          docker info --format '{{.ServerVersion}}'
          docker system df
          echo "=== Required images ==="
          missing=0
          for img in voxis-ci:latest; do
            if docker image inspect "$img" > /dev/null 2>&1; then
              echo "  ✅ $img"
            else
              echo "  ❌ $img MISSING"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing required Docker images missing"
            exit 1
          fi
          echo "=== Preflight passed ==="

      - name: resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if ! echo "$tag" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: invalid tag '$tag'"; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "tag: $tag"

      - name: checkout release tag in persistent worktree
        run: |
          set -euo pipefail
          REPO="/home/spex/work/voxis"
          mkdir -p "$(dirname "$REPO")"
          if [ ! -d "$REPO/.git" ]; then
            git clone "${CI_GIT_BASE:-$GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" "$REPO"
          fi
          cd "$REPO"
          git remote set-url origin "${CI_GIT_BASE:-$GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraheader="Authorization: basic $(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)" \
            fetch --force origin "refs/tags/${{ steps.tag.outputs.tag }}" "refs/heads/main:refs/remotes/origin/main"
          git checkout FETCH_HEAD --detach
          actual=$(git --no-pager describe --tags --exact-match HEAD 2>/dev/null || echo 'none')
          echo "checked out: $actual  HEAD: $(git rev-parse --short HEAD)"
          expected="${{ steps.tag.outputs.tag }}"; expected="${expected#v}"
          cargo_ver=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$cargo_ver" != "$expected" ]; then
            echo "ERROR: src-tauri/Cargo.toml version '$cargo_ver' != tag '$expected'"
            exit 1
          fi

      - name: clean artifacts and build Linux + Windows (Docker)
        run: |
          set -euo pipefail
          cd /home/spex/work/voxis
          # artifacts/ holds release binaries; dist/ is vite's frontend outDir
          # (emptied by every `bun run build`). Keep them separate so parallel
          # build lanes don't wipe each other's outputs.
          rm -rf artifacts && mkdir -p artifacts
          bash scripts/build-all-platforms.sh --no-macos
          echo "=== artifacts ==="
          ls -lh artifacts/
          tag="${{ steps.tag.outputs.tag }}"
          VERSION="${tag#v}"
          expected_files=(
            "artifacts/voxis-linux-x64-gui"
            "artifacts/voxis-windows-x64-gui.exe"
            "artifacts/Voxis_${VERSION}_x64-setup.exe"
          )
          for f in "${expected_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: expected artifact missing: $f"
              exit 1
            fi
          done
          echo "all expected Linux/Windows GUI artifacts present ✓"

      - name: build macOS (best-effort — KVM VM)
        continue-on-error: true
        timeout-minutes: 60
        run: |
          set -uo pipefail
          cd /home/spex/work/voxis
          PREPARED="$HOME/clipshot-macos-vm/mac_hdd_ng.prepared.img"
          if [ ! -f "$PREPARED" ]; then
            echo "⚠️ no prepared macOS VM image at $PREPARED — skipping macOS"
            exit 0
          fi
          if [ ! -e /dev/kvm ]; then
            echo "⚠️ /dev/kvm not available — skipping macOS"
            exit 0
          fi
          if bash scripts/macos-vm.sh build; then
            echo "=== macOS artifacts ==="
            ls -lh artifacts/voxis-macos-* 2>/dev/null
            tar -C artifacts -czf artifacts/voxis-macos-universal.tar.gz voxis-macos-universal 2>/dev/null || true
            echo "✅ macOS build succeeded"
          else
            echo "⚠️ macOS build failed (advisory — not blocking release)"
          fi
          bash scripts/macos-vm.sh stop 2>/dev/null || true

      - name: publish to Forgejo release
        run: |
          set -euo pipefail
          cd /home/spex/work/voxis
          tag="${{ steps.tag.outputs.tag }}"
          VERSION="${tag#v}"
          api="${GITHUB_SERVER_URL%/}/api/v1/repos/${GITHUB_REPOSITORY}"
          auth="Authorization: token ${GITHUB_TOKEN}"
          rid=$(curl -fsSL -H "$auth" "$api/releases/tags/$tag" 2>/dev/null | \
                python3 -c 'import sys,json;print(json.load(sys.stdin).get("id",""))' 2>/dev/null || true)
          if [ -z "$rid" ]; then
            echo "creating release $tag"
            rid=$(curl -fsSL -X POST -H "$auth" -H "Content-Type: application/json" \
              "$api/releases" \
              -d "{\"tag_name\":\"$tag\",\"name\":\"$tag\",\"draft\":false,\"prerelease\":false}" | \
              python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')
          fi
          echo "release id: $rid"
          artifacts=(
            "artifacts/voxis-linux-x64-gui"
            "artifacts/voxis-windows-x64-gui.exe"
            "artifacts/Voxis_${VERSION}_x64-setup.exe"
          )
          for f in artifacts/voxis-macos-arm64 artifacts/voxis-macos-x64 artifacts/voxis-macos-universal artifacts/voxis-macos-universal.tar.gz; do
            [ -f "$f" ] && artifacts+=("$f")
          done
          for f in "${artifacts[@]}"; do
            [ -f "$f" ] || { echo "skip missing $f"; continue; }
            name="$(basename "$f")"
            existing=$(curl -fsSL -H "$auth" "$api/releases/$rid/assets" 2>/dev/null | \
              python3 -c "import sys,json;[print(a['id']) for a in json.load(sys.stdin) if a['name']=='$name']" 2>/dev/null || true)
            for aid in $existing; do
              curl -fsSL -X DELETE -H "$auth" "$api/releases/$rid/assets/$aid" >/dev/null 2>&1 || true
            done
            echo "uploading $name"
            curl -fsSL -X POST -H "$auth" \
              -F "attachment=@$f;filename=$name" \
              "$api/releases/$rid/assets?name=$name" >/dev/null
          done

      - name: publish to GitHub release (public binaries only)
        continue-on-error: true
        run: |
          set -euo pipefail
          cd /home/spex/work/voxis
          tag="${{ steps.tag.outputs.tag }}"
          VER="${tag#v}"
          if ! command -v gh >/dev/null 2>&1; then
            echo "WARNING: gh CLI missing; skipping GitHub release"
            exit 0
          fi
          gh release create "$tag" --repo axelbaumlisto/voxis --title "v$VER" --notes-file CHANGELOG.md || true
          files=(artifacts/voxis-* artifacts/Voxis_*)
          gh release upload "$tag" "${files[@]}" --repo axelbaumlisto/voxis --clobber

      - name: mirror to voxis.top/dist
        continue-on-error: true
        run: |
          set -euo pipefail
          cd /home/spex/work/voxis
          tag="${{ steps.tag.outputs.tag }}"
          VERSION="${tag#v}"
          DIST_DIR="/home/spex/app/bundle/voxis-landing/landing/dist"
          mkdir -p "$DIST_DIR"
          rm -f "$DIST_DIR"/Voxis_*_x64-setup.exe
          for f in artifacts/voxis-linux-x64-gui artifacts/voxis-windows-x64-gui.exe "artifacts/Voxis_${VERSION}_x64-setup.exe"; do
            [ -f "$f" ] && cp -v "$f" "$DIST_DIR/$(basename "$f")"
          done
          for f in artifacts/voxis-macos-arm64 artifacts/voxis-macos-x64 artifacts/voxis-macos-universal artifacts/voxis-macos-universal.tar.gz; do
            [ -f "$f" ] && cp -v "$f" "$DIST_DIR/$(basename "$f")"
          done
          [ -f "$DIST_DIR/Voxis_${VERSION}_x64-setup.exe" ] && cp -v "$DIST_DIR/Voxis_${VERSION}_x64-setup.exe" "$DIST_DIR/Voxis_x64-setup.exe"

      - name: update Homebrew formula (advisory)
        continue-on-error: true
        run: |
          set -euo pipefail
          cd /home/spex/work/voxis
          bash scripts/ci/update-homebrew.sh "${{ steps.tag.outputs.tag }}" || true

      - name: restore repo to main
        if: always()
        run: |
          cd /home/spex/work/voxis 2>/dev/null || exit 0
          git checkout main 2>/dev/null || true
          git pull --ff-only origin main 2>/dev/null || true
          echo "repo restored to main"

  docs-audit:
    runs-on: host
    needs: [build]
    continue-on-error: true
    timeout-minutes: 45
    env:
      GIT_PAGER: cat
      PAGER: cat
    steps:
      - name: docs-auditor + screenshotter (advisory)
        run: |
          set -euo pipefail
          cd /home/spex/work/voxis
          bash scripts/ci/run-docs-agents.sh "${{ needs.build.outputs.tag }}"

  publish:
    runs-on: host
    needs: [build, docs-audit]
    timeout-minutes: 10
    steps:
      - name: verify package publication
        run: |
          set -euo pipefail
          tag="${{ needs.build.outputs.tag }}"
          VERSION="${tag#v}"
          API="${GITHUB_SERVER_URL%/}/api/v1/repos/${GITHUB_REPOSITORY}"
          echo "=== Forgejo release assets ==="
          curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" "$API/releases/tags/$tag" | \
            python3 -c 'import sys,json; d=json.load(sys.stdin); print("assets:", len(d.get("assets", []))); [print(" -", a.get("name")) for a in d.get("assets", [])]'
          echo "=== local artifacts ==="
          ls -lh /home/spex/work/voxis/artifacts/voxis-* /home/spex/work/voxis/artifacts/Voxis_* 2>/dev/null || true
          echo "=== mirror probes ==="
          curl -sI https://voxis.top/dist/voxis-linux-x64-gui | head -1 || true
          curl -sI "https://voxis.top/dist/Voxis_${VERSION}_x64-setup.exe" | head -1 || true
