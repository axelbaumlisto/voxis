title: Voxis Docs
description: Voxis — voice dictation app built with Tauri, React, and Rust
url: https://docs.voxis.top
# Served at a custom-domain ROOT (CNAME docs.voxis.top). Pin baseurl to empty:
# actions/configure-pages auto-derives baseurl=/voxis from the repo name, which
# would prefix every CSS/link/image with /voxis/* and 404 the whole site.
baseurl: ""
markdown: kramdown
theme: minima
plugins: []
header_pages:
  - installation.md
  - usage.md
  - settings.md
  - themes.md
  - development.md
  - security.md
  - troubleshooting.md

